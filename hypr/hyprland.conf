

# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

autogenerated = 0

$mainMod = SUPER
$terminal = alacritty
$fileManager = pcmanfm
$menu = wofi -show drun

bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, P, exec, pavucontrol
bind = $mainMod, B, exec, helium
bind = $mainMod, L, exec, swaylock -f -i ~/Downloads/wallhaven-nk51dd_1920x1080.png
bind = $mainMod, left, layoutmsg, move -col 
bind = $mainMod, right, layoutmsg, move +col
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
exec-once = swaybg -m fill -i /home/voidwalker/Downloads/wallhaven-e7ozyw_1920x1080.png
exec-once = waybar
exec-once = swayidle -w \
  timeout 600 'swaylock -f -i ~/Downloads/wallhaven-nk51dd_1920x1080.png' \
  before-sleep 'swaylock -f -i ~/Downloads/wallhaven-nk51dd_1920x1080.png'
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic

input {
    repeat_delay = 200
    repeat_rate = 35
}

general {
  layout = scrolling
  gaps_in = 15
  border_size = 8
  col.active_border = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
  col.inactive_border = rgba(24283bff)
}

scrolling {
    column_width = 0.9
    follow_focus = true
    focus_fit_method = 1
    direction = right
} 

decoration {
  rounding = 0
} 
